# Ejemplo de virtual host de nginx para OurHouse.
# Copialo a /etc/nginx/sites-available/ourhouse, ajustá server_name y activalo:
#
#   sudo ln -s /etc/nginx/sites-available/ourhouse /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Nota: NO uses "try_files ... /index.html" ni root a archivos estáticos.
# Ahora es una app con servidor: nginx solo hace de proxy al proceso Node.

server {
    listen 80;
    listen [::]:80;

    # 👇 Cambiá esto por tu dominio (o la IP del VPS si no tenés dominio).
    server_name tu-dominio.com;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
